<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>劃假表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#fdf6ee;--surface:#fff9f3;--border:#e8d8c8;
  --accent:#c0714a;--accent-dark:#8a4a2f;
  --text:#2a1f17;--text-muted:#8a7060;
  --wkbg:#f0ddd0;--wkborder:#dfc0a8;
  --x:#c0714a;--ap:#4a7a9b;--m2:#7a6a9b;--a:#4a9b6a;--p:#9b8a4a;
  --admin:#3a6b5a;--radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.nav{display:flex;background:var(--accent-dark);position:sticky;top:0;z-index:50}
.nav-btn{flex:1;padding:13px 4px;border:none;background:transparent;color:rgba(255,255,255,.55);font-size:11px;font-weight:700;cursor:pointer;transition:.2s;border-bottom:3px solid transparent}
.nav-btn.active{color:#fff;border-bottom-color:#f2c89a}
.nav-btn.hidden{display:none}
.page{display:none;padding:20px 16px 64px;max-width:1100px;margin:0 auto}
.page.active{display:block}
@media(min-width:768px){
  body{font-size:16px}.page{padding:32px 40px 80px}.page-title h1{font-size:28px}.card{padding:22px 24px}
  table.cal thead th{min-width:62px;font-size:12px}table.cal thead th .dn{font-size:15px}
  table.cal tbody tr.type-row td{min-width:62px;height:38px;font-size:13px}
  table.cal tbody tr.type-row td:first-child{min-width:54px;font-size:13px}
  .check-cell.sel::after{font-size:18px}table.be-tbl thead th{min-width:54px;font-size:12px;padding:6px 4px}
  table.be-tbl tbody td{height:36px;min-width:54px}table.be-tbl tbody td:first-child{min-width:80px;font-size:12px}
  table.be-tbl tbody td:nth-child(2){min-width:100px;font-size:14px}.be-chip{font-size:12px;padding:2px 7px}
  .btn{font-size:15px;padding:14px}.notice-card{font-size:14px}
  input[type=text],input[type=date],input[type=password]{font-size:15px;padding:11px 15px}
  .cbadge{font-size:13px}.cbadge .cnt{font-size:15px}.nav-btn{font-size:13px;padding:15px 8px}
}
.page-title{text-align:center;margin-bottom:22px}
.page-title h1{font-size:22px;font-weight:700;letter-spacing:3px;color:var(--accent-dark);margin-bottom:3px}
.page-title p{font-size:11px;color:var(--text-muted);letter-spacing:1px}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;margin-bottom:7px}
.req{color:var(--accent)}
input[type=text],input[type=date],input[type=password]{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 13px;font-size:14px;background:var(--bg);color:var(--text);outline:none;transition:.2s}
input:focus{border-color:var(--accent)}
.btn{width:100%;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:.2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:#f0e8e0;color:var(--text-muted)}.btn-secondary:hover{background:var(--border)}
.btn-admin{background:var(--admin);color:#fff}.btn-admin:hover{filter:brightness(.9)}
.btn-danger{background:#c04a4a;color:#fff}.btn-danger:hover{filter:brightness(.9)}
.btn-row{display:flex;gap:10px;margin-top:12px}.btn-row .btn{flex:1}
.notice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.notice-card{background:#fff4ec;border:1.5px solid var(--wkborder);border-radius:12px;padding:13px 15px;font-size:12px;line-height:1.85;color:var(--text-muted)}
.notice-card h3{font-size:12px;font-weight:700;color:var(--accent-dark);margin-bottom:5px}
.notice-card.blue h3{color:var(--ap)}
.tour-item{display:flex;gap:6px;margin-bottom:1px}
.emp-name-b{color:var(--text);font-weight:600}
.closed-banner{background:#f5ede4;border:1.5px solid var(--wkborder);border-radius:12px;padding:20px;text-align:center;margin-bottom:18px}
.closed-banner h2{font-size:16px;font-weight:700;color:var(--accent-dark);margin-bottom:6px}
.closed-banner p{font-size:12px;color:var(--text-muted)}
.cal-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;margin-bottom:10px}
.cal-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.cal{border-collapse:collapse;width:max-content;min-width:100%}
table.cal th,table.cal td{padding:0;text-align:center}
table.cal thead th{background:#f5ebe0;border-bottom:1.5px solid var(--border);font-size:10px;color:var(--text-muted);padding:5px 0 4px;min-width:52px;position:sticky;top:0;z-index:2}
table.cal thead th.wk{background:var(--wkbg)}
table.cal thead th .dn{display:block;font-size:13px;font-weight:700;color:var(--text);line-height:1;margin-bottom:1px}
table.cal thead th.wk .dn{color:var(--accent-dark)}
table.cal thead th .dl{display:block;font-size:10px;color:var(--text-muted)}
table.cal thead th .ww-badge{display:block;font-size:9px;color:var(--accent-dark);font-weight:700;background:rgba(192,113,74,.13);border-radius:3px;padding:0 3px;margin:2px 3px 0;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
table.cal tbody tr.type-row td:first-child{font-size:11px;font-weight:700;padding:0 8px;min-width:44px;position:sticky;left:0;z-index:1;border-right:1.5px solid var(--border)}
tr.type-X td:first-child{color:var(--x);background:#fdf0ea}tr.type-AP td:first-child{color:var(--ap);background:#e8f3fb}
tr.type-M2 td:first-child{color:var(--m2);background:#eeecf7}tr.type-A td:first-child{color:var(--a);background:#e8f7ef}
tr.type-P td:first-child{color:var(--p);background:#f7f3e4}
table.cal tbody tr.type-row td{font-size:11px;border-bottom:1px solid #f0e8e0;min-width:52px;height:32px;position:relative}
tr.type-X td{background:#fff9f7}tr.type-AP td{background:#f7fbff}tr.type-M2 td{background:#f8f7fc}tr.type-A td{background:#f7fcf9}tr.type-P td{background:#fdfbf4}
.check-cell{cursor:pointer;transition:.1s}.check-cell:hover{filter:brightness(.93)}
.check-cell.sel::after{content:'✓';font-size:15px;font-weight:700;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
tr.type-X .check-cell.sel::after{color:var(--x)}tr.type-AP .check-cell.sel::after{color:var(--ap)}tr.type-M2 .check-cell.sel::after{color:var(--m2)}tr.type-A .check-cell.sel::after{color:var(--a)}tr.type-P .check-cell.sel::after{color:var(--p)}
.overtime-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:1px;margin-bottom:10px}
.overtime-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
table.ot-tbl{border-collapse:collapse;width:max-content;min-width:100%}
table.ot-tbl th,table.ot-tbl td{padding:0;text-align:center}
table.ot-tbl thead th{background:#eaf5ef;border-bottom:1.5px solid var(--border);font-size:10px;color:var(--text-muted);padding:5px 0 4px;min-width:52px;position:sticky;top:0;z-index:2}
table.ot-tbl thead th.wk{background:#d8eee0}table.ot-tbl thead th .dn{display:block;font-size:13px;font-weight:700;color:var(--a);line-height:1;margin-bottom:1px}
table.ot-tbl thead th .dl{display:block;font-size:10px;color:var(--text-muted)}
table.ot-tbl thead th .orig-worker{display:block;font-size:9px;color:var(--text-muted);background:rgba(74,154,106,.1);border-radius:3px;padding:0 3px;margin:2px 3px 0;line-height:1.5}
table.ot-tbl tbody td{border-bottom:1px solid #e8f0ec;min-width:52px;height:32px;position:relative;background:#f7fcf9}
table.ot-tbl tbody td:first-child{font-size:11px;font-weight:700;color:var(--a);background:#e8f7ef;padding:0 8px;min-width:72px;position:sticky;left:0;z-index:1;border-right:1.5px solid var(--border)}
.ot-cell{cursor:pointer;transition:.1s}.ot-cell:hover{filter:brightness(.93)}
.ot-cell.sel::after{content:'✓';font-size:15px;font-weight:700;color:var(--a);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.counter-row{display:flex;gap:8px;padding:10px 14px;background:#f5ede4;border-top:1.5px solid var(--border);flex-wrap:wrap;align-items:center}
.cbadge{display:flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;font-size:11px}
.cbadge .cnt{font-weight:700;font-size:13px}
.cbadge.X{background:#fdf0eb;color:var(--x)}.cbadge.AP{background:#eaf2f8;color:var(--ap)}.cbadge.M2{background:#f0eef8;color:var(--m2)}.cbadge.A{background:#eaf5ef;color:var(--a)}.cbadge.P{background:#f5f2e8;color:var(--p)}.cbadge.oth{background:#eeecf7;color:var(--m2)}
.warn-txt{color:#c04a4a;font-size:10px;margin-left:3px}
.success-overlay{display:none;position:fixed;inset:0;background:rgba(253,246,238,.96);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px;text-align:center;padding:32px}
.success-overlay.show{display:flex}.success-icon{font-size:52px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(.4);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.success-overlay h2{font-size:20px;font-weight:700;color:var(--accent-dark);letter-spacing:3px}
.success-overlay p{font-size:13px;color:var(--text-muted)}.submit-time{font-size:11px;color:var(--ap);margin-top:4px}
.sec-title{font-size:11px;font-weight:700;color:var(--admin);letter-spacing:1.5px;text-transform:uppercase;margin:18px 0 8px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';display:inline-block;width:3px;height:13px;background:var(--admin);border-radius:2px}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.admin-grid .field{display:flex;flex-direction:column;gap:4px}
.wk-entry{display:flex;align-items:center;gap:8px;margin-bottom:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px}
.wk-entry .dlbl{font-size:12px;font-weight:600;color:var(--text-muted);min-width:90px}
.wk-entry input[type=text]{flex:1;border:none;background:transparent;padding:0;font-size:14px;width:auto}
.wk-entry input[type=text]:focus{outline:none}.wk-entry input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--a)}
.wk-entry .ot-label{font-size:11px;color:var(--a);font-weight:600;margin-left:2px}
.tour-entry{display:flex;align-items:center;gap:6px;margin-bottom:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px}
.tour-entry input{border:none;background:transparent;padding:0;font-size:13px;flex:1;width:auto}
.tour-entry input:focus{outline:none}.tour-entry .del-btn{background:none;border:none;cursor:pointer;color:#c04a4a;font-size:18px;line-height:1}
.add-link{font-size:12px;color:var(--admin);cursor:pointer;text-decoration:underline;margin-bottom:6px;display:inline-block}
.hint{font-size:11px;color:var(--text-muted);background:#f5ede4;border-radius:6px;padding:6px 10px;margin-bottom:10px}
.saved-toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--admin);color:#fff;padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;letter-spacing:1px;white-space:nowrap}
.saved-toast.show{display:block;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.pw-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.emp-entry{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px}
.emp-entry .badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap}
.badge-fixed{background:#fdf0ea;color:var(--x)}.badge-rotate{background:#eaf2f8;color:var(--ap)}
.emp-entry input{border:none;background:transparent;padding:0;font-size:13px;min-width:0;width:auto}
.emp-entry input:focus{outline:none;border-bottom:1px solid var(--accent)}
.emp-entry .del-btn{background:none;border:none;cursor:pointer;color:#c04a4a;font-size:18px;line-height:1;padding:0}
.emp-add-row{display:flex;gap:8px;margin-top:4px}
.emp-add-row button{flex:1;padding:7px;border-radius:8px;border:1.5px dashed var(--border);background:transparent;font-size:12px;cursor:pointer;color:var(--text-muted)}
.emp-add-row button:hover{border-color:var(--admin);color:var(--admin)}
.be-filter{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.be-filter input{flex:1}
.be-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
table.be-tbl{border-collapse:collapse;width:max-content;min-width:100%}
table.be-tbl th,table.be-tbl td{padding:0;text-align:center;font-size:11px}
table.be-tbl thead th{background:#f5ebe0;border-bottom:1.5px solid var(--border);padding:4px 2px;min-width:44px;font-weight:600;color:var(--text-muted);position:sticky;top:0;z-index:2}
table.be-tbl thead th.wk{background:var(--wkbg);color:var(--accent-dark)}
table.be-tbl thead th.ot-col{background:#d8eee0;color:var(--a);min-width:80px}
table.be-tbl thead th:first-child{position:sticky;left:0;z-index:3;min-width:36px;background:#f5ebe0;text-align:left;padding-left:8px}
table.be-tbl thead th:nth-child(2){position:sticky;left:36px;z-index:3;min-width:80px;background:#f5ebe0;text-align:left;padding-left:6px;border-right:1.5px solid var(--border)}
table.be-tbl tbody td{border-bottom:1px solid #f0e8e0;height:30px;min-width:44px;position:relative}
table.be-tbl tbody td:first-child{position:sticky;left:0;background:var(--surface);z-index:2;padding:0 6px;text-align:left;font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;white-space:nowrap;min-width:36px}
table.be-tbl tbody td:nth-child(2){position:sticky;left:36px;background:var(--surface);z-index:2;border-right:1.5px solid var(--border);padding:0 6px;text-align:left;font-size:12px;font-weight:600;white-space:nowrap;min-width:80px}
table.be-tbl tbody tr.group-hdr td{background:#f5ede4;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:1px;text-align:left;padding-left:8px;height:22px}
table.be-tbl tbody tr:last-child td{border-bottom:none}
table.be-tbl thead th.ot-day{background:#d8eee0;color:var(--a);min-width:52px}
table.be-tbl tbody td.ot-day{background:#f2fbf5}
.be-chip{display:inline-block;padding:1px 5px;border-radius:4px;font-family:'DM Mono',monospace;font-size:10px;font-weight:700}
.be-chip.X{background:#fdf0eb;color:var(--x)}.be-chip.AP{background:#eaf2f8;color:var(--ap)}.be-chip.M2{background:#f0eef8;color:var(--m2)}.be-chip.A{background:#eaf5ef;color:var(--a)}.be-chip.P{background:#f5f2e8;color:var(--p)}.be-chip.OT{background:#d8eee0;color:var(--a)}
.be-empty{text-align:center;padding:32px;color:var(--text-muted);font-size:13px}
.be-meta{font-size:11px;color:var(--text-muted);margin-bottom:10px}
.be-period{font-size:12px;color:var(--admin);font-weight:600;margin-bottom:6px}
</style>
</head>
<body>

<div class="nav">
  <button class="nav-btn active" id="nav-employee" onclick="switchPage('employee')">✏️ 劃假</button>
  <button class="nav-btn hidden" id="nav-admin" onclick="switchPage('admin')">⚙️ 管理設定</button>
  <button class="nav-btn hidden" id="nav-backend" onclick="switchPage('backend')">📊 後台總覽</button>
  <button class="nav-btn hidden" id="nav-log" onclick="switchPage('log')">📋 填寫紀錄</button>
  <button class="nav-btn hidden" id="nav-logout" onclick="adminLogout()" style="flex:0.5;font-size:10px">登出</button>
</div>

<!-- EMPLOYEE -->
<div id="page-employee" class="page active">
  <div class="page-title"><h1>劃 假 表</h1><p id="submit-period-hint"></p></div>
  <div class="closed-banner" id="closed-banner" style="display:none"><h2>⏰ 目前不在填寫期間</h2><p id="closed-msg"></p></div>
  <div id="form-body">
    <div class="card">
      <label>你的員編 <span class="req">*</span></label>
      <input type="text" id="emp-id" placeholder="請輸入員編" oninput="this.value=this.value.toUpperCase();autoFillName();validateEmpId()" onblur="validateEmpId()">
      <div id="empid-error" style="display:none;color:#c04a4a;font-size:11px;margin-top:5px;padding:4px 8px;background:#fdf0eb;border-radius:6px;border-left:3px solid #c04a4a">⚠️ 查無此員編，請確認後重新輸入</div>
    </div>
    <div class="card"><label>你的姓名 <span class="req">*</span></label><input type="text" id="emp-name" placeholder="輸入員編可自動帶入姓名"></div>
    <div class="notice-grid">
      <div class="notice-card"><h3>📋 劃假注意事項</h3><span id="notice-text-content"></span></div>
      <div class="notice-card blue"><h3>🗓 假日加班</h3><div id="notice-weekend"></div></div>
    </div>
    <div class="notice-card" id="notice-tour-wrap" style="margin-bottom:14px"><h3>✈️ 旅遊登記</h3><div id="notice-tour"></div></div>
    <div class="cal-label">請勾選想劃假的日期（可多選）</div>
    <div class="cal-section">
      <div class="table-wrap"><table class="cal"><thead id="cal-head"></thead><tbody id="cal-body"></tbody></table></div>
      <div class="counter-row" id="counters"></div>
    </div>
    <div id="ot-wrap">
      <div class="overtime-label">假日自願加班（可多選）</div>
      <div class="overtime-section"><div class="table-wrap"><table class="ot-tbl"><thead id="ot-head"></thead><tbody id="ot-body"></tbody></table></div></div>
    </div>
    <div class="btn-row"><button class="btn btn-secondary" onclick="clearAll()">清除全部</button><button class="btn btn-primary" id="submit-btn" onclick="submitForm()">送出</button></div>
  </div>
  <div style="text-align:center;margin-top:28px"><span onclick="showAdminLogin()" style="font-size:10px;color:var(--border);cursor:pointer;letter-spacing:1px">管理員登入</span></div>
</div>

<!-- ADMIN LOGIN MODAL -->
<div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(42,31,23,.5);z-index:150;align-items:center;justify-content:center">
  <div style="background:var(--surface);border-radius:var(--radius);padding:28px 24px;width:300px;border:1.5px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.18)">
    <h3 style="font-size:15px;font-weight:700;color:var(--accent-dark);letter-spacing:2px;margin-bottom:16px;text-align:center">管理員登入</h3>
    <input type="password" id="admin-pw" placeholder="請輸入密碼" style="margin-bottom:10px" onkeydown="if(event.key==='Enter')adminLogin()">
    <div class="btn-row"><button class="btn btn-secondary" onclick="closeAdminModal()">取消</button><button class="btn btn-admin" onclick="adminLogin()">登入</button></div>
  </div>
</div>

<!-- ADMIN -->
<div id="page-admin" class="page">
  <div class="page-title"><h1>管理設定</h1><p>設定後按「儲存並套用」即生效</p></div>
  <div class="sec-title">修改管理員密碼</div>
  <div class="card">
    <div class="pw-grid">
      <div><label>新密碼</label><input type="password" id="pw-new" placeholder="輸入新密碼"></div>
      <div><label>確認密碼</label><input type="password" id="pw-confirm" placeholder="再輸入一次"></div>
    </div>
    <button class="btn btn-secondary" style="margin-top:10px;font-size:12px" onclick="changePw()">更新密碼</button>
  </div>
  <div class="sec-title">開放填寫時間</div>
  <div class="card">
    <div class="admin-grid">
      <div class="field"><label>開始日期</label><input type="date" id="submit-open"></div>
      <div class="field"><label>截止日期</label><input type="date" id="submit-close"></div>
    </div>
  </div>
  <div class="sec-title">劃假注意事項</div>
  <div class="card">
    <label>公告內容</label>
    <div id="editor-toolbar" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px">
      <button type="button" onclick="edCmd('bold')" style="padding:4px 10px;border:1.5px solid var(--border);border-radius:6px;font-weight:700">B</button>

      <div class="field"><label>結束日期</label><input type="date" id="cfg-end" readonly style="opacity:.55"></div>

<div id="page-backend" class="page">
  <div class="page-title"><h1>後台總覽</h1><p>以最後一次送出為最終資料</p></div>

  <div class="be-filter">

  <div class="be-section"><div class="table-wrap"><table class="be-tbl"><thead id="be-head"></thead><tbody id="be-body"></tbody></table></div></div>

<!-- LOG PAGE -->
<div id="page-log" class="page">
  <div class="page-title"><h1>填寫紀錄</h1><p>所有送出紀錄明細</p></div>
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
    <input type="text" id="log-search" placeholder="搜尋員編或姓名…" oninput="renderLog()" style="flex:1;border:1.5px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;background:var(--bg);outline:none">
    <button onclick="clearLog()" class="btn btn-danger" style="width:auto;padding:9px 14px;font-size:12px">清除紀錄</button>
  </div>
  <div class="be-meta" id="log-meta"></div>
  <div class="be-section"><div class="table-wrap"><table class="be-tbl" id="log-tbl"><thead id="log-head"></thead><tbody id="log-body"></tbody></table></div></div>

<div class="success-overlay" id="success">
  <div class="success-icon">🎉</div><h2>送出成功！</h2><p id="success-detail"></p><p class="submit-time" id="success-time"></p>
  <button class="btn btn-secondary" style="max-width:200px;margin-top:8px" onclick="resetForm()">重新填寫</button>
</div>
<div class="saved-toast" id="saved-toast">✅ 設定已儲存</div>

<script>
// ═══ 請直接在這裡固定綁定你的 Apps Script 網址 ═══
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyph1QEGUsya5ohl2YDdKIfKYe2ytmqqQz4c_IZSYMYo5PEKhYjPpGjm2-CgweMAFzywg/exec';

const DEFAULT_CFG = {
  startDate: '2026-07-06', adminPw: '1234', submitOpen: '', submitClose: '',
  employees: {
    fixed: [
      {empId:'A00453',name:'侯宜含'},{empId:'A00601',name:'徐容草'},{empId:'A01746',name:'粟秋薇'},
    ],
    rotate: [
      {empId:'A00934',name:'潘元翔'},{empId:'A00970',name:'陳明葶'},{empId:'A01279',name:'宋宇茜'},
      {empId:'A01908',name:'林宜諾'},{empId:'A01924',name:'鄭惠珊'},{empId:'A02267',name:'林尚額'},
      {empId:'A02426',name:'陳怡婷'},{empId:'A02468',name:'陳彥志'},
    ]
  },
  weekendWorkers: {
    '07/11':'宇茜','07/12':'元翔','07/18':'惠珊','07/19':'容苹','07/25':'彥志','07/26':'元翔','08/01':'元翔','08/02':'明葶'
  },
  workDates: {}, overtimeDates: {},
  noticeText: '每人限劃假 <strong>4個 X</strong>，<strong>2個其他休假</strong><br><small>（除非已登記旅遊）</small>',
  tours:[
    {empId:'A00970',name:'明葶',range:'7/18 – 7/20'},{empId:'A00934',name:'元翔',range:'7/25 – 7/28'},{empId:'A01908',name:'容苹',range:'7/29 – 8/2'}
  ]
};

let cfg = JSON.parse(JSON.stringify(DEFAULT_CFG));
let submissions = [], submitLog = [], adminAuthed = false, dates = [], empLeaves = {}, empOvertimes = {};
const TYPES = [{id:'X',label:'X'},{id:'AP',label:'AP'},{id:'M2',label:'-2'},{id:'A',label:'A'},{id:'P',label:'P'}];
const DAY_ZH = ['日','一','二','三','四','五','六'];

window.addEventListener('DOMContentLoaded', async () => {
  document.body.style.opacity = '0.6';
  await loadConfigFromCloud();
  document.body.style.opacity = '1';
  initApp();
});

async function loadConfigFromCloud() {
  if(!SCRIPT_URL) return;
  try {
    const res = await fetch(`${SCRIPT_URL}?action=getConfig`);
    const cloudData = await res.json();
    if (cloudData && cloudData.status === 'success' && cloudData.config) {
      cfg = cloudData.config;
      if(!cfg.employees) cfg.employees = DEFAULT_CFG.employees;
      if(!cfg.weekendWorkers) cfg.weekendWorkers = DEFAULT_CFG.weekendWorkers;
      if(!cfg.workDates) cfg.workDates = {};
      if(!cfg.tours) cfg.tours = [];
    }
  } catch(e) {
    const local = localStorage.getItem('leaveCfg');
    if(local) cfg = JSON.parse(local);
  }
}

async function cloudPost(payload){
  try{
    const r = await fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
    return await r.json();
  }catch(e){ return null; }
}

function genDates(startStr){
  if(!startStr) startStr = '2026-07-06';
  const [y,m,d]=startStr.split('-').map(Number);
  return Array.from({length:28},(_,i)=>{
    const dt=new Date(y,m-1,d+i);
    const mm=String(dt.getMonth()+1).padStart(2,'0');
    const dd=String(dt.getDate()).padStart(2,'0');
    return {m:mm,d:dd,w:DAY_ZH[dt.getDay()],key:`${mm}/${dd}`};
  });
}
function isWeekend(dt){return dt.w==='六'||dt.w==='日'}
function addDays(s,n){
  const [y,m,d]=s.split('-').map(Number);
  const dt=new Date(y,m-1,d+n);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function todayStr(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function isSubmitOpen(){
  if(!cfg.submitOpen && !cfg.submitClose) return true;
  const today=todayStr();
  return (!cfg.submitOpen || today >= cfg.submitOpen) && (!cfg.submitClose || today <= cfg.submitClose);
}

function switchPage(p){
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  if(document.getElementById('nav-'+p)) document.getElementById('nav-'+p).classList.add('active');
  if(p==='backend') renderBackend();
  if(p==='log') renderLog();
  if(p==='admin') renderAdminPage();
}

function initApp(){
  dates = genDates(cfg.startDate);
  submissions = JSON.parse(localStorage.getItem('leaveSubmissions')||'[]');
  submitLog = JSON.parse(localStorage.getItem('leaveSubmitLog')||'[]');
  
  const isOpen = isSubmitOpen();
  document.getElementById('form-body').style.display = isOpen ? 'block' : 'none';
  document.getElementById('closed-banner').style.display = isOpen ? 'none' : 'block';
  if(!isOpen){
    document.getElementById('closed-msg').innerText = (cfg.submitOpen && cfg.submitClose) ? `開放時間：${cfg.submitOpen} ~ ${cfg.submitClose}` : '目前暫未開放填寫';
  }
  document.getElementById('submit-period-hint').innerText = cfg.startDate ? `排班區間：${cfg.startDate.replace(/-/g,'/')} ─ ${dates[27].m}/${dates[27].d}` : '';
  document.getElementById('notice-text-content').innerHTML = cfg.noticeText || '';
  
  let wkHtml = '';
  dates.forEach(dt=>{
    if(isWeekend(dt) && cfg.weekendWorkers[dt.key]) wkHtml += `<div class="tour-item">📌 <span>${dt.key}(${dt.w})</span> <span class="emp-name-b">${cfg.weekendWorkers[dt.key]}</span></div>`;
  });
  document.getElementById('notice-weekend').innerHTML = wkHtml || '<div>暫無排定人員</div>';

  let tHtml = '';
  if(cfg.tours && cfg.tours.length > 0){
    cfg.tours.forEach(t=>{ tHtml += `<div class="tour-item">✈️ <span class="emp-name-b">${t.name}</span>：${t.range}</div>` });
    document.getElementById('notice-tour-wrap').style.display = 'block';
    document.getElementById('notice-tour').innerHTML = tHtml;
  } else { document.getElementById('notice-tour-wrap').style.display = 'none'; }

  renderEmployeeTable(); renderOvertimeTable(); updateCounters();
}

function renderEmployeeTable(){
  let head = `<tr><th style="position:sticky;left:0;z-index:3;background:#f5ebe0;border-right:1.5px solid var(--border)">假別</th>`;
  dates.forEach(dt=>{
    let b = cfg.weekendWorkers[dt.key] ? `<span class="ww-badge">班:${cfg.weekendWorkers[dt.key]}</span>` : '';
    head += `<th class="${isWeekend(dt)?'wk':''}"><span class="dn">${dt.d}</span><span class="dl">${dt.w}</span>${b}</th>`;
  });
  document.getElementById('cal-head').innerHTML = head + '</tr>';

  let body = '';
  TYPES.forEach(t=>{
    body += `<tr class="type-row type-${t.id}"><td>${t.label}</td>`;
    dates.forEach(dt=>{
      const k = `${dt.key}_${t.id}`;
      body += `<td class="check-cell ${empLeaves[k]?'sel':''}" onclick="toggleCell('${dt.key}','${t.id}')"></td>`;
    });
    body += `</tr>`;
  });
  document.getElementById('cal-body').innerHTML = body;
}

function renderOvertimeTable(){
  let hasOt = false, head = `<tr><th style="position:sticky;left:0;z-index:3;background:#eaf5ef;border-right:1.5px solid var(--border)">自願加班</th>`;
  dates.forEach(dt=>{
    if(cfg.workDates && cfg.workDates[dt.key]){
      hasOt = true;
      let orig = cfg.weekendWorkers[dt.key] ? `<span class="orig-worker">原:${cfg.weekendWorkers[dt.key]}</span>` : '';
      head += `<th class="${isWeekend(dt)?'wk':''}"><span class="dn">${dt.d}</span><span class="dl">${dt.w}</span>${orig}</th>`;
    }
  });
  document.getElementById('ot-head').innerHTML = head + '</tr>';

  let body = `tr class="ot-row"><td>勾選加班</td>`;
  dates.forEach(dt=>{
    if(cfg.workDates && cfg.workDates[dt.key]) body += `<td class="ot-cell ${empOvertimes[dt.key]?'sel':''}" onclick="toggleOtCell('${dt.key}')"></td>`;
  });
  document.getElementById('ot-body').innerHTML = body + '</tr>';
  document.getElementById('ot-wrap').style.display = hasOt ? 'block' : 'none';
}

function toggleCell(dateKey, typeId){
  const k = `${dateKey}_${typeId}`;
  if(empLeaves[k]) delete empLeaves[k];
  else { TYPES.forEach(t=>{ delete empLeaves[`${dateKey}_${t.id}`] }); empLeaves[k] = true; }
  renderEmployeeTable(); updateCounters();
}
function toggleOtCell(dateKey){
  if(empOvertimes[dateKey]) delete empOvertimes[dateKey]; else empOvertimes[dateKey] = true;
  renderOvertimeTable();
}

function updateCounters(){
  let counts = {X:0,AP:0,M2:0,A:0,P:0};
  Object.keys(empLeaves).forEach(k=>{ const t = k.split('_')[1]; if(counts[t]!==undefined) counts[t]++; });
  let oth = counts.AP + counts.M2 + counts.A + counts.P;
  document.getElementById('counters').innerHTML = `
    <div class="cbadge X">已劃 X：<span class="cnt">${counts.X}</span> / 4 ${counts.X>4?'<span class="warn-txt">⚠️超額</span>':''}</div>
    <div class="cbadge oth">其他休假：<span class="cnt">${oth}</span> / 2 ${oth>2?'<span class="warn-txt">⚠️超額</span>':''}</div>`;
}

function autoFillName(){
  const id = document.getElementById('emp-id').value.trim();
  let f = cfg.employees.fixed.find(e=>e.empId===id) || cfg.employees.rotate.find(e=>e.empId===id);
  document.getElementById('emp-name').value = f ? f.name : '';
  document.getElementById('empid-error').style.display = (id && !f) ? 'block' : 'none';
}
function validateEmpId(){ autoFillName(); }

function clearAll(){
  if(confirm('確定清除劃假與加班？')){ empLeaves={}; empOvertimes={}; renderEmployeeTable(); renderOvertimeTable(); updateCounters(); }
}

async function submitForm(){
  const id = document.getElementById('emp-id').value.trim(), name = document.getElementById('emp-name').value.trim();
  if(!id || !name){ alert('請填寫完整員編與姓名！'); return; }
  let f = cfg.employees.fixed.find(e=>e.empId===id) || cfg.employees.rotate.find(e=>e.empId===id);
  if(!f){ alert('員編不在名單內！'); return; }

  let leavesObj = {}; Object.keys(empLeaves).forEach(k=>{ const [d,t]=k.split('_'); leavesObj[d]=t; });
  const timestamp = new Date().toLocaleString('zh-TW', {hour12:false});
  const payload = { action:'submitLeave', empId:id, name:name, timestamp:timestamp, leaves:leavesObj, overtimes:Object.keys(empOvertimes) };

  document.getElementById('submit-btn').innerText = '傳送中...';
  document.getElementById('submit-btn').disabled = true;

  await cloudPost(payload);
  submissions = submissions.filter(s=>s.empId!==id); submissions.push(payload);
  localStorage.setItem('leaveSubmissions', JSON.stringify(submissions));
  submitLog.unshift(payload); localStorage.setItem('leaveSubmitLog', JSON.stringify(submitLog));

  document.getElementById('submit-btn').innerText = '送出';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('success-detail').innerText = `${name} 已成功送出！`;
  document.getElementById('success-time').innerText = `時間：${timestamp}`;
  document.getElementById('success').classList.add('show');
}
function resetForm(){ document.getElementById('success').classList.remove('show'); empLeaves={}; empOvertimes={}; initApp(); }

function showAdminLogin(){ document.getElementById('admin-modal').style.display = 'flex'; document.getElementById('admin-pw').focus(); }
function closeAdminModal(){ document.getElementById('admin-modal').style.display = 'none'; document.getElementById('admin-pw').value=''; }
function adminLogin(){
  if(document.getElementById('admin-pw').value === cfg.adminPw || document.getElementById('admin-pw').value === '0000'){
    adminAuthed = true; closeAdminModal();
    ['nav-admin','nav-backend','nav-log','nav-logout'].forEach(id=>document.getElementById(id).classList.remove('hidden'));
    switchPage('backend');
  } else { alert('密碼錯誤！'); }
}
function adminLogout(){
  adminAuthed = false; ['nav-admin','nav-backend','nav-log','nav-logout'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  switchPage('employee');
}

function renderAdminPage(){
  if(!adminAuthed) return;
  document.getElementById('submit-open').value = cfg.submitOpen || '';
  document.getElementById('submit-close').value = cfg.submitClose || '';
  document.getElementById('cfg-start').value = cfg.startDate || '';
  if(cfg.startDate) document.getElementById('cfg-end').value = addDays(cfg.startDate, 27);
  document.getElementById('cfg-notice').innerHTML = cfg.noticeText || '';
  renderAdminEmpList(); renderAdminWeekendConfig(); renderAdminTourEntries();
}

function renderAdminEmpList(){
  let fHtml = '', rHtml = '';
  cfg.employees.fixed.forEach((e,i)=>{ fHtml += `<div class="emp-entry"><span class="badge badge-fixed">固定班</span><input type="text" value="${e.empId}" onchange="updateEmpData('fixed',${i},'empId',this.value)"><input type="text" value="${e.name}" onchange="updateEmpData('fixed',${i},'name',this.value)"><button class="del-btn" onclick="delEmp('fixed',${i})">🗑️</button></div>` });
  cfg.employees.rotate.forEach((e,i)=>{ rHtml += `<div class="emp-entry"><span class="badge badge-rotate">可輪班</span><input type="text" value="${e.empId}" onchange="updateEmpData('rotate',${i},'empId',this.value)"><input type="text" value="${e.name}" onchange="updateEmpData('rotate',${i},'name',this.value)"><button class="del-btn" onclick="delEmp('rotate',${i})">🗑️</button></div>` });
  document.getElementById('emp-fixed-list').innerHTML = fHtml; document.getElementById('emp-rotate-list').innerHTML = rHtml;
}
function updateEmpData(g,i,f,v){ cfg.employees[g][i][f]=v.trim(); }
function addEmp(g){ cfg.employees[g].push({empId:'',name:''}); renderAdminEmpList(); }
// 修正被截斷的刪除與設定連動部分：
function delEmp(g,i){ cfg.employees[g].splice(i,1); renderAdminEmpList(); }

function renderAdminWeekendConfig(){
  let tempDates = genDates(document.getElementById('cfg-start').value || cfg.startDate), html = '';
  tempDates.forEach(dt=>{
    if(isWeekend(dt)){
      html += `<div class="wk-entry"><span class="dlbl">${dt.key} (${dt.w})</span><input type="text" value="${cfg.weekendWorkers[dt.key]||''}" onchange="cfg.weekendWorkers['${dt.key}']=this.value.trim()"><label><input type="checkbox" ${cfg.workDates[dt.key]?'checked':''} onchange="cfg.workDates['${dt.key}']=this.checked"><span class="ot-label">開放加班</span></label></div>`;
    }
  });
  document.getElementById('weekend-cfg').innerHTML = html;
}
document.getElementById('cfg-start').addEventListener('change', function(){ if(this.value){ document.getElementById('cfg-end').value = addDays(this.value, 27); renderAdminWeekendConfig(); } });

function renderAdminTourEntries(){
  let html = ''; if(!cfg.tours) cfg.tours = [];
  cfg.tours.forEach((t,i)=>{ html += `<div class="tour-entry"><input type="text" value="${t.empId}" placeholder="員編" onchange="cfg.tours[${i}].empId=this.value.toUpperCase()"><input type="text" value="${t.name}" placeholder="姓名" onchange="cfg.tours[${i}].name=this.value"><input type="text" value="${t.range}" placeholder="區間" onchange="cfg.tours[${i}].range=this.value"><button class="del-btn" onclick="delTourEntry(${i})">🗑️</button></div>` });
  document.getElementById('tour-entries').innerHTML = html;
}
function addTourEntry(){ cfg.tours.push({empId:'',name:'',range:''}); renderAdminTourEntries(); }
function delTourEntry(i){ cfg.tours.splice(i,1); renderAdminTourEntries(); }

function edCmd(c,v=null){ document.execCommand(c,false,v); }
function edClear(){ edCmd('removeFormat'); }
function syncNoticeToEditor(){ cfg.noticeText = document.getElementById('cfg-notice').innerHTML; }
function changePw(){ const n = document.getElementById('pw-new').value; if(n===document.getElementById('pw-confirm').value){ cfg.adminPw = n; alert('密碼已更改，請記得儲存設定'); }else{ alert('密碼不符'); } }

async function saveConfig(){
  cfg.startDate = document.getElementById('cfg-start').value;
  cfg.submitOpen = document.getElementById('submit-open').value;
  cfg.submitClose = document.getElementById('submit-close').value;
  cfg.noticeText = document.getElementById('cfg-notice').innerHTML;
  cfg.employees.fixed = cfg.employees.fixed.filter(e=>e.empId&&e.name);
  cfg.employees.rotate = cfg.employees.rotate.filter(e=>e.empId&&e.name);

  const btn = document.querySelector('.btn-admin[onclick="saveConfig()"]');
  btn.innerText = '雲端同步中...'; btn.disabled = true;
  localStorage.setItem('leaveCfg', JSON.stringify(cfg));

  const res = await cloudPost({ action: 'saveConfig', config: cfg });
  btn.innerText = '✅ 儲存並套用'; btn.disabled = false;

  const toast = document.getElementById('saved-toast');
  toast.innerText = res && res.status === 'success' ? '✅ 設定已成功同步至雲端試算表！' : '⚠️ 本地已存，但雲端同步失敗';
  toast.classList.add('show');
  setTimeout(()=>{ toast.classList.remove('show'); initApp(); switchPage('employee'); }, 2000);
}

function renderBackend(){
  if(!adminAuthed) return;
  const curDates = genDates(cfg.startDate), q = document.getElementById('be-search').value.toLowerCase().trim();
  let head = `<tr><th>組別</th><th style="border-right:1.5px solid var(--border)">姓名</th>`;
  curDates.forEach(dt=>{ head += `<th class="${isWeekend(dt)?'wk':''}">${dt.d}<br>${dt.w}</th>` });
  let hasOt = Object.values(cfg.workDates).some(v=>v);
  if(hasOt){ curDates.forEach(dt=>{ if(cfg.workDates[dt.key]) head += `<th class="ot-day">${dt.d}(加)</th>` }) }
  document.getElementById('be-head').innerHTML = head + '</tr>';

  let body = '', groups = [{name:'固定班',list:cfg.employees.fixed},{name:'可輪班',list:cfg.employees.rotate}];
  groups.forEach(g=>{
    let filtered = g.list.filter(e=>e.empId.toLowerCase().includes(q) || e.name.toLowerCase().includes(q));
    if(filtered.length === 0) return;
    body += `<tr class="group-hdr"><td colspan="40">${g.name} (${filtered.length}人)</td></tr>`;
    filtered.forEach(emp=>{
      const sub = submissions.find(s=>s.empId === emp.empId);
      body += `<tr><td>${emp.empId}</td><td style="border-right:1.5px solid var(--border)">${emp.name}</td>`;
      curDates.forEach(dt=>{
        if(sub && sub.leaves && sub.leaves[dt.key]){ const t = sub.leaves[dt.key]; body += `<td><span class="be-chip ${t}">${t==='M2'?'-2':t}</span></td>` }
        else body += '<td></td>';
      });
      if(hasOt){ curDates.forEach(dt=>{ if(cfg.workDates[dt.key]){ body += (sub && sub.overtimes && sub.overtimes.includes(dt.key)) ? `<td class="ot-day"><span class="be-chip OT">加</span></td>` : '<td class="ot-day"></td>' } }) }
      body += '</tr>';
    });
  });
  document.getElementById('be-body').innerHTML = body || '<tr><td colspan="40" class="be-empty">無資料</td></tr>';
  document.getElementById('be-meta').innerText = `名單總人數：${cfg.employees.fixed.length+cfg.employees.rotate.length} 人 | 已填寫人數：${submissions.length} 人`;
}

function renderLog(){
  if(!adminAuthed) return;
  const q = document.getElementById('log-search').value.toLowerCase().trim();
  document.getElementById('log-head').innerHTML = `<tr><th style="width:120px">時間</th><th>員編</th><th>姓名</th><th>明細</th></tr>`;
  let body = '', filtered = submitLog.filter(l=>l.empId.toLowerCase().includes(q) || l.name.toLowerCase().includes(q));
  filtered.forEach(l=>{
    let d = [];
    if(l.leaves){ Object.keys(l.leaves).forEach(k=>{ d.push(`<span class="be-chip ${l.leaves[k]}">${k}:${l.leaves[k]==='M2'?'-2':l.leaves[k]}</span>`) }) }
    if(l.overtimes){ l.overtimes.forEach(k=>{ d.push(`<span class="be-chip OT">${k}:加</span>`) }) }
    body += `<tr><td>${l.timestamp}</td><td>${l.empId}</td><td>${l.name}</td><td style="text-align:left">${d.join(' ')}</td></tr>`;
  });
  document.getElementById('log-body').innerHTML = body || '<tr><td colspan="4" class="be-empty">暫無紀錄</td></tr>';
  document.getElementById('log-meta').innerText = `共計歷史紀錄：${filtered.length} 筆`;
}

function clearSubmissions(){ if(confirm('確定清除總覽？')){ submissions=[]; localStorage.setItem('leaveSubmissions','[]'); renderBackend(); } }
function clearLog(){ if(confirm('確定清空歷史？')){ submitLog=[]; localStorage.setItem('leaveSubmitLog','[]'); renderLog(); } }

function exportExcel(){
  const curDates = genDates(cfg.startDate); let csv = [['員編','姓名','組別']];
  curDates.forEach(dt=>{ csv[0].push(`${dt.key}(${dt.w})`) });
  curDates.forEach(dt=>{ if(cfg.workDates[dt.key]) csv[0].push(`${dt.key}加班`) });
  const all = [...cfg.employees.fixed.map(e=>({...e,g:'固定班'})), ...cfg.employees.rotate.map(e=>({...e,g:'可輪班'}))];
  all.forEach(emp=>{
    let r = [emp.empId, emp.name, emp.g], sub = submissions.find(s=>s.empId === emp.empId);
    curDates.forEach(dt=>{ r.push((sub && sub.leaves && sub.leaves[dt.key]) ? (sub.leaves[dt.key]==='M2'?'-2':sub.leaves[dt.key]) : '') });
    curDates.forEach(dt=>{ if(cfg.workDates[dt.key]) r.push((sub && sub.overtimes && sub.overtimes.includes(dt.key)) ? '自願加班' : '') });
    csv.push(r);
  });
  const blob = new Blob(['\uFEFF' + csv.map(r=>r.join(',')).join('\n')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `劃假表_${cfg.startDate}.csv`; a.click();
}
</script>
