<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>劃假表</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=300;400;500;700&family=DM+Mono:wght=400;500&display=swap');
:root{\n  --bg:#fdf6ee;--surface:#fff9f3;--border:#e8d8c8;\n  --accent:#c0714a;--accent-dark:#8a4a2f;\n  --text:#2a1f17;--text-muted:#8a7060;\n  --wkbg:#f0ddd0;--wkborder:#dfc0a8;\n  --x:#c0714a;--ap:#4a7a9b;--m2:#7a6a9b;--a:#4a9b6a;--p:#9b8a4a;\n  --admin:#3a6b5a;--radius:14px;\n}\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}\n\n.nav{display:flex;background:var(--accent-dark);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(42,31,23,0.15);overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}\n.nav::-webkit-scrollbar{display:none}\n.nav-btn{flex:1;text-align:center;padding:14px 10px;color:rgba(255,249,243,0.65);font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;transition:all 0.2s ease;min-width:75px}\n.nav-btn.active{color:#fff;background:rgba(255,255,255,0.1);font-weight:700;box-shadow:inset 0 -3px 0 #fff}\n\n.container{max-width:1100px;margin:0 auto;padding:12px;padding-bottom:30px}\n.page{display:none}\n.page.active{display:block}\n\n.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 4px 12px rgba(42,31,23,0.03)}\n.card-title{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--accent-dark);display:flex;align-items:center;gap:6px}\n\n.notice-box{background:#f5ede4;border-left:4px solid var(--accent);padding:10px 12px;border-radius:6px;font-size:13px;line-height:1.5;color:#5a4535;white-space:pre-wrap}\n\n.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n.form-group{margin-bottom:10px}\n.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:4px;color:var(--text)}\n.select-custom,.input-custom{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;-webkit-appearance:none}\n.select-custom:focus,.input-custom:focus{border-color:var(--accent)}\n\n.table-wrap{width:100%;overflow-x:auto;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:12px;-webkit-overflow-scrolling:touch}\n.grid-table{width:100%;border-collapse:collapse;font-size:13px;text-align:center;min-width:700px}\n.grid-table th,.grid-table td{padding:8px 2px;border:1px solid var(--border);min-width:42px}\n.grid-table th{background:#fbf5ee;font-weight:700;color:var(--text)}\n.grid-table th.wk{background:var(--wkbg);color:var(--accent-dark)}\n.grid-table td.wk{background:#fffcf9}\n\n.cbadge{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:700;color:var(--text-muted);cursor:pointer;transition:all 0.1s ease;display:inline-flex;align-items:center;justify-content:center;user-select:none;-webkit-user-select:none}\n.cbadge:active{transform:scale(0.9)}\n.cbadge.s-X{background:var(--x);color:#fff;border-color:var(--x)}\n.cbadge.s-AP{background:var(--ap);color:#fff;border-color:var(--ap)}\n.cbadge.s-M2{background:var(--m2);color:#fff;border-color:var(--m2)}\n.cbadge.s-A{background:var(--a);color:#fff;border-color:var(--a)}\n.cbadge.s-P{background:var(--p);color:#fff;border-color:var(--p)}\n\n.legend-box{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;padding:8px 10px;background:#fcf8f4;border-radius:8px;border:1px solid var(--border)}\n.legend-item{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:500}\n.legend-circle{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}\n\n.ot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(85px,1fr));gap:6px;margin-top:6px}\n.ot-node{border:1px solid var(--border);border-radius:6px;padding:6px 2px;text-align:center;background:#fff;cursor:pointer;font-size:12px;user-select:none;transition:all 0.1s}\n.ot-node.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}\n.ot-node.disabled{background:#f0e6dc;color:#bca89a;cursor:not-allowed;opacity:0.5;border-color:#e4d4c4}\n\n.btn-main{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;box-shadow:0 3px 8px rgba(192,113,74,0.2);display:flex;align-items:center;justify-content:center;gap:6px}\n.btn-main:hover{background:var(--accent-dark)}\n.btn-main:active{transform:scale(0.99)}\n.btn-main:disabled{background:#d0beaf;box-shadow:none;cursor:not-allowed}\n\n.summary-bar{font-size:12px;margin-top:8px;color:var(--text-muted);display:flex;gap:10px;flex-wrap:wrap;background:#fbf5ee;padding:6px 10px;border-radius:6px}\n\n.sync-banner{background:#eaf2f0;border:1px solid #b2d3c9;border-radius:8px;padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:8px}\n.sync-title{font-size:13px;color:#3a6b5a;font-weight:700;display:flex;align-items:center;gap:4px}\n.btn-sync{padding:5px 10px;background:#3a6b5a;color:#fff;border:none;border-radius:4px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px}\n.btn-sync:hover{background:#284d41}\n\n.be-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}\n.be-table th,.be-table td{padding:8px 6px;border:1px solid var(--border);text-align:center}\n.be-table th{background:#e2ece9;color:#3a6b5a;font-weight:700}\n.be-table tr:nth-child(even){background:#f7faf9}\n.be-empty{color:var(--text-muted);padding:24px;text-align:center;font-style:italic}\n\n.admin-tabs{display:flex;gap:6px;margin-bottom:10px;border-bottom:2px solid var(--border);padding-bottom:6px}\n.admin-tab-btn{padding:6px 12px;border:none;background:none;color:var(--text-muted);font-size:13px;font-weight:700;cursor:pointer;border-radius:4px}\n.admin-tab-btn.active{background:#3a6b5a;color:#fff}\n.admin-sub-page{display:none}\n.admin-sub-page.active{display:block}\n.textarea-custom{width:100%;height:80px;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:13px;resize:vertical;outline:none}\n\n@media(max-width:600px){\n  .container{padding:8px}\n  .card{padding:10px;margin-bottom:10px}\n  .form-row{grid-template-columns:1fr;gap:0}\n  .nav-btn{padding:10px 6px;font-size:13px;min-width:65px}\n  .cbadge{width:29px;height:29px;font-size:12px}\n  .grid-table th,.grid-table td{padding:6px 1px;font-size:12px;min-width:36px}\n}
</style>
</head>
<body>

<div class="nav">
  <button class="nav-btn active" id="nav-form" onclick="switchPage('form')">✏️ 劃假</button>
  <button class="nav-btn" id="nav-backend" onclick="switchPage('backend')">📊 後台總覽</button>
  <button class="nav-btn" id="nav-log" onclick="switchPage('log')">📋 填寫紀錄</button>
  <button class="nav-btn" id="nav-admin" onclick="switchPage('admin')">⚙️ 管理設定</button>
</div>

<div class="container">
  
  <div id="page-form" class="page active">
    <div class="card">
      <div class="card-title">📢 劃假注意事項</div>
      <div id="form-notice" class="notice-box"></div>
    </div>
    
    <div class="card">
      <div class="card-title">👤 填寫人員資訊</div>
      <div class="form-row">
        <div class="form-group">
          <label>組別</label>
          <select id="user-group" class="select-custom" onchange="onGroupChange()">
            <option value="fixed">固定班</option>
            <option value="rotate">輪班組</option>
          </select>
        </div>
        <div class="form-group">
          <label>姓名</label>
          <select id="user-name" class="select-custom" onchange="onUserChange()">
            <option value="">請選擇...</option>
          </select>
        </div>
      </div>
      <div id="user-emp-id" style="font-size:12px;color:var(--text-muted);margin-top:2px;font-family:monospace;padding-left:2px"></div>
    </div>

    <div class="card" id="calendar-card" style="display:none">
      <div class="card-title">📅 選擇指定假期 (點擊圓圈切換)</div>
      
      <div class="legend-box">
        <div class="legend-item"><span class="legend-circle" style="background:var(--x)">X</span><span>例休假</span></div>
        <div class="legend-item"><span class="legend-circle" style="background:var(--ap)">AP</span><span>特休</span></div>
        <div class="legend-item"><span class="legend-circle" style="background:var(--m2)">M2</span><span>會議減班</span></div>
        <div class="legend-item"><span class="legend-circle" style="background:var(--a)">A</span><span>AM假</span></div>
        <div class="legend-item"><span class="legend-circle" style="background:var(--p)">P</span><span>PM假</span></div>
      </div>

      <div class="table-wrap">
        <table class="grid-table">
          <thead>
            <tr id="grid-header-wk"></tr>
            <tr id="grid-header-day"></tr>
          </thead>
          <tbody>
            <tr id="grid-action-row"></tr>
          </tbody>
        </table>
      </div>

      <div class="summary-bar" id="count-summary"></div>
    </div>

    <div class="card" id="ot-card" style="display:none">
      <div class="card-title">💪 自願加班意願調查 (可多選)</div>
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:4px">若當日人力不足，您願意出來加班的日期：</p>
      <div class="ot-grid" id="ot-box"></div>
    </div>

    <button id="btn-submit" class="btn-main" onclick="doSubmitForm()" disabled>確認無誤，送出劃假</button>
  </div>

  <div id="page-backend" class="page">
    <div class="sync-banner">
      <div class="sync-title"><span>📊</span> 雲端即時狀態總覽</div>
      <button class="btn-sync" onclick="forceRefreshData(this)">🔄 同步最新雲端資料</button>
    </div>
    
    <div class="card" style="margin-bottom:10px">
      <button class="btn-sync" style="background:var(--accent);width:100%;justify-content:center;padding:10px" onclick="exportToCSV()">📥 下載當期劃假紀錄表 (CSV)</button>
    </div>

    <div class="card" style="overflow-x:auto;padding:10px">
      <div class="card-title">📋 所有人最終劃假</div>
      <table class="be-table">
        <thead>
          <tr>
            <th>組別</th>
            <th>員編</th>
            <th>姓名</th>
            <th>最後送出時間</th>
            <th>劃假明細 / 加班意願摘要</th>
          </tr>
        </thead>
        <tbody id="be-body">
          <tr><td colspan="5" class="be-empty">暫無資料</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="page-log" class="page">
    <div class="sync-banner">
      <div class="sync-title"><span>📋</span> 全員送出歷程流水帳</div>
      <button class="btn-sync" onclick="forceRefreshData(this)">🔄 同步最新雲端資料</button>
    </div>

    <div class="card" style="overflow-x:auto;padding:10px">
      <table class="be-table">
        <thead>
          <tr>
            <th style="text-align:left">送出時間</th>
            <th style="text-align:left">員編</th>
            <th style="text-align:left">姓名</th>
            <th style="text-align:left">異動內容摘要</th>
          </tr>
        </thead>
        <tbody id="log-body">
          <tr><td colspan="4" class="be-empty">暫無資料</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="page-admin" class="page">
    <div class="card" id="admin-auth-card">
      <div class="card-title">🔒 管理員權限驗證</div>
      <div class="form-group">
        <label>請輸入管理密碼</label>
        <input type="password" id="admin-pw-input" class="input-custom" placeholder="預設為 1234">
      </div>
      <button class="btn-main" style="background:var(--admin)" onclick="checkAdminAuth()">驗證登入</button>
    </div>

    <div id="admin-main-box" style="display:none">
      <div class="admin-tabs">
        <button class="admin-tab-btn active" id="atb-basic" onclick="switchAdminTab('basic')">基本設定</button>
        <button class="admin-tab-btn" id="atb-emps" onclick="switchAdminTab('emps')">名單編修</button>
      </div>

      <div id="asub-basic" class="admin-sub-page active">
        <div class="card">
          <div class="form-group">
            <label>1. 劃假週期起始日 (務必選星期一)</label>
            <input type="date" id="cfg-start-date" class="input-custom" onchange="previewDates()">
          </div>
          <div class="form-group">
            <label>2. 劃假公告佈告欄文字</label>
            <textarea id="cfg-notice" class="textarea-custom"></textarea>
          </div>
          <div class="form-group">
            <label>3. 變更管理密碼</label>
            <input type="text" id="cfg-pw" class="input-custom">
          </div>
        </div>

        <div class="card">
          <div class="card-title">📅 當期國定假 / 補班日設定 (點擊切換)</div>
          <p style="font-size:11px;color:var(--text-muted);margin-bottom:6px">橘色=不開放劃假(國定假) | 綠色=開放劃假(補班日)</p>
          <div class="table-wrap">
            <table class="grid-table">
              <thead>
                <tr id="cfg-grid-wk"></tr>
                <tr id="cfg-grid-day"></tr>
              </thead>
              <tbody>
                <tr id="cfg-grid-action"></tr>
              </tbody>
            </table>
          </div>
        </div>
        <button class="btn-main" style="background:var(--admin);margin-bottom:15px" id="btn-save-cfg-1" onclick="doSaveConfig()">儲存設定並同步至雲端</button>
      </div>

      <div id="asub-emps" class="admin-sub-page">
        <div class="card">
          <div class="card-title">👥 人員名單檔案 (JSON 格式)</div>
          <div class="form-group">
            <label style="color:var(--accent-dark)">● 固定班同仁名單</label>
            <textarea id="cfg-emps-fixed" class="textarea-custom" style="height:110px;font-family:monospace;font-size:11px"></textarea>
          </div>
          <div class="form-group" style="margin-top:10px">
            <label style="color:var(--accent-dark)">● 輪班組同仁名單</label>
            <textarea id="cfg-emps-rotate" class="textarea-custom" style="height:110px;font-family:monospace;font-size:11px"></textarea>
          </div>
        </div>
        <button class="btn-main" style="background:var(--admin)" id="btn-save-cfg-2" onclick="doSaveConfig()">儲存設定並同步至雲端</button>
      </div>
    </div>
  </div>

</div>

<script>
// ═══════════ 全域變數與核心設定 ═══════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6T868n6N6_6qgUonYh9xCH8nS77P4q0Fp2Wp2qR6V_uT9j3t-0MvMvD8LhYg-p5q0/exec';

const DEFAULT_CFG = {
  startDate: "2026-05-11",
  noticeText: "1. 請於截止日前完成劃假。\n2. 特休(AP)請依各組剩餘額度酌量排定。\n3. 送出後如需重劃，在截止日前再次送出即可覆蓋舊紀錄。",
  adminPw: "1234",
  employees: {
    fixed: [
      {id:"1001",name:"同仁A"},{id:"1002",name:"同仁B"},{id:"1003",name:"同仁C"},
      {id:"1004",name:"同仁D"},{id:"1005",name:"同仁E"},{id:"1006",name:"同仁F"}
    ],
    rotate: [
      {id:"2001",name:"同仁G"},{id:"2002",name:"同仁H"},{id:"2003",name:"同仁I"},
      {id:"2004",name:"同仁J"},{id:"2005",name:"同仁K"}
    ]
  },
  overtimeDates: {}, 
  workDates: {}       
};

let cfg = JSON.parse(JSON.stringify(DEFAULT_CFG));
let cloudData = { submissions:[], submitLog:[] };
let userPicks = {};      
let userOvertime = [];   

const STATES = ['', 'X', 'AP', 'M2', 'A', 'P'];
const WKNAMES = ['日','一','二','三','四','五','六'];

// ═══════════ 🛠️ 核心修正：將原本錯誤的 fetch 改回真正的 JSONP 方式 ═══════════
function cloudGet(action) {
  if (!SCRIPT_URL) return Promise.resolve(null);
  return new Promise((resolve, reject) => {
    // 1. 自動產生每次請求都唯一的隨機 callback 名稱
    const callbackName = 'jsonp_' + Math.floor(Math.random() * 1000000);
    
    // 2. 將這個暫時的函式綁定到全域視窗中，好讓 Apps Script 執行它
    window[callbackName] = function(data) {
      delete window[callbackName];            // 資料處理完畢後隨手銷毀
      document.body.removeChild(script);      // 移除載入的標籤
      resolve(data);
    };
    
    // 3. 建立 script 標籤，並將引數 callback 傳遞給後端配合支援
    const script = document.createElement('script');
    // 強加入 _t= 時間戳記，避免手機或網頁瀏覽器儲存失敗快取
    script.src = `${SCRIPT_URL}?action=${action}&callback=${callbackName}&_t=${Date.now()}`;
    
    // 4. 連線出錯安全閥
    script.onerror = (err) => {
      delete window[callbackName];
      try { document.body.removeChild(script); } catch(e){}
      reject(err);
    };
    
    document.body.appendChild(script);
  });
}

function cloudPost(action, payload) {
  if(!SCRIPT_URL) return Promise.resolve({ok:false, error:'無 API'});
  const body = Object.assign({ action: action }, payload);
  return fetch(SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }).then(() => ({ ok: true }))
    .catch(err => ({ ok: false, error: err.toString() }));
}

// ═══════════ 分頁與導覽切換 ═══════════
function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

  const targetPage = document.getElementById(`page-${pageId}`);
  const targetBtn = document.getElementById(`nav-${pageId}`);
  if(targetPage) targetPage.classList.add('active');
  if(targetBtn) targetBtn.classList.add('active');

  if (pageId === 'backend' || pageId === 'log') {
    if (SCRIPT_URL) {
      cloudGet('getData').then(res => {
        if (res && res.ok) {
          cloudData.submissions = res.submissions || [];
          cloudData.submitLog = res.submitLog || [];
          if (pageId === 'backend') renderBackendTable();
          else renderLogTable();
        }
      }).catch(err => console.error(err));
    }
  } else if (pageId === 'admin') {
    showAdminTabs(isAdminAuthenticated);
  }
}

function forceRefreshData(btn) {
  const oldText = btn.innerText;
  btn.innerText = '🔄 同步中...';
  btn.disabled = true;

  cloudGet('getData').then(res => {
    if(res && res.ok) {
      cloudData.submissions = res.submissions || [];
      cloudData.submitLog = res.submitLog || [];
      renderBackendTable();
      renderLogTable();
      alert('✅ 雲端最新數據已同步完成！');
    } else {
      alert('❌ 同步失敗');
    }
  }).catch(err => alert(err.toString())).finally(() => {
    btn.innerText = oldText;
    btn.disabled = false;
  });
}

// ═══════════ 前端填寫邏輯 ═══════════
function buildEmployeePage() {
  document.getElementById('form-notice').innerText = cfg.noticeText || '';
  onGroupChange();
  buildPeriodGrid();
}

function onGroupChange() {
  const group = document.getElementById('user-group').value;
  const nameSelect = document.getElementById('user-name');
  nameSelect.innerHTML = '<option value="">請選擇...</option>';
  
  const list = (cfg.employees && cfg.employees[group]) ? cfg.employees[group] : [];
  list.forEach(emp => {
    const opt = document.createElement('option');
    opt.value = emp.name;
    opt.dataset.id = emp.id;
    opt.innerText = `${emp.name} (${emp.id})`;
    nameSelect.appendChild(opt);
  });
  onUserChange();
}

function onUserChange() {
  const nameSelect = document.getElementById('user-name');
  const opt = nameSelect.options[nameSelect.selectedIndex];
  const empIdEl = document.getElementById('user-emp-id');
  const calCard = document.getElementById('calendar-card');
  const otCard = document.getElementById('ot-card');
  const btnSub = document.getElementById('btn-submit');

  if(!opt || !opt.value) {
    empIdEl.innerText = '';
    calCard.style.display = 'none';
    otCard.style.display = 'none';
    btnSub.disabled = true;
    return;
  }

  empIdEl.innerText = `員工編號：${opt.dataset.id}`;
  calCard.style.display = 'block';
  otCard.style.display = 'block';
  btnSub.disabled = false;

  userPicks = {};
  userOvertime = [];
  
  resetGridUiValues();
  buildOtContainer();
  updateCountSummary();
}

function getPeriodDates() {
  const arr = [];
  if(!cfg.startDate) return arr;
  const base = new Date(cfg.startDate);
  for(let i=0; i<28; i++) {
    const d = new Date(base.getTime() + i*24*60*60*1000);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const dateStr = `${yyyy}-${mm}-${dd}`;
    arr.push({ dateStr: dateStr, dayNum: d.getDate(), wkName: WKNAMES[d.getDay()], isWk: (d.getDay()===0 || d.getDay()===6) });
  }
  return arr;
}

function buildPeriodGrid() {
  const dates = getPeriodDates();
  const hWk = document.getElementById('grid-header-wk');
  const hDay = document.getElementById('grid-header-day');
  const rAct = document.getElementById('grid-action-row');

  hWk.innerHTML = ''; hDay.innerHTML = ''; rAct.innerHTML = '';

  dates.forEach((d, idx) => {
    let isHoliday = d.isWk;
    if(cfg.overtimeDates && cfg.overtimeDates[d.dateStr]) isHoliday = true;
    if(cfg.workDates && cfg.workDates[d.dateStr])     isHoliday = false;

    const thWk = document.createElement('th');
    thWk.innerText = d.wkName;
    if(isHoliday) thWk.className = 'wk';
    hWk.appendChild(thWk);

    const thDay = document.createElement('th');
    thDay.innerText = d.dayNum;
    if(isHoliday) thDay.className = 'wk';
    hDay.appendChild(thDay);

    const td = document.createElement('td');
    if(isHoliday) td.className = 'wk';
    
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cbadge';
    btn.id = `pk-${idx}`;
    btn.innerText = '';
    btn.onclick = () => toggleState(idx, d.dateStr);
    
    td.appendChild(btn);
    rAct.appendChild(td);
  });
}

function toggleState(idx, dateStr) {
  const current = userPicks[dateStr] || '';
  let nextIdx = STATES.indexOf(current) + 1;
  if(nextIdx >= STATES.length) nextIdx = 0;
  const nextState = STATES[nextIdx];

  if(nextState) userPicks[dateStr] = nextState;
  else delete userPicks[dateStr];

  const otItem = document.getElementById(`ot-item-${idx}`);
  if(nextState !== '') {
    if(otItem) { otItem.classList.add('disabled'); otItem.classList.remove('active'); }
    userOvertime = userOvertime.filter(v => v !== dateStr);
  } else {
    if(otItem) otItem.classList.remove('disabled');
  }

  refreshBtnUi(idx, nextState);
  updateCountSummary();
}

function refreshBtnUi(idx, state) {
  const btn = document.getElementById(`pk-${idx}`);
  if(!btn) return;
  btn.className = 'cbadge';
  if(state) btn.classList.add(`s-${state}`);
  btn.innerText = state;
}

function resetGridUiValues() {
  const dates = getPeriodDates();
  dates.forEach((d, idx) => {
    refreshBtnUi(idx, userPicks[d.dateStr] || '');
  });
}

function updateCountSummary() {
  const counts = {};
  STATES.forEach(s => { if(s) counts[s] = 0; });
  Object.values(userPicks).forEach(v => { if(counts[v]!=null) counts[v]++; });
  const txt = Object.keys(counts).map(k => `<b>${k}</b>: ${counts[k]}天`).join(' | ');
  document.getElementById('count-summary').innerHTML = '目前統計結果 — ' + (txt || '無劃假');
}

function buildOtContainer() {
  const box = document.getElementById('ot-box');
  box.innerHTML = '';
  getPeriodDates().forEach((d, idx) => {
    const item = document.createElement('div');
    item.className = 'ot-node';
    item.id = `ot-item-${idx}`;
    item.innerText = `${d.dateStr.split('-')[1]}/${d.dayNum} (${d.wkName})`;

    if(userPicks[d.dateStr] != null) item.classList.add('disabled');
    if(userPicks[d.dateStr] == null && userOvertime.includes(d.dateStr)) item.classList.add('active');

    item.onclick = () => {
      if(userPicks[d.dateStr] != null) return; 
      if(userOvertime.includes(d.dateStr)) {
        userOvertime = userOvertime.filter(v => v !== d.dateStr);
        item.classList.remove('active');
      } else {
        userOvertime.push(d.dateStr);
        item.classList.add('active');
      }
    };
    box.appendChild(item);
  });
}

function doSubmitForm() {
  const group = document.getElementById('user-group').value;
  const nameSelect = document.getElementById('user-name');
  const opt = nameSelect.options[nameSelect.selectedIndex];
  if(!opt || !opt.value) return alert('請先選擇您的姓名！');

  const btn = document.getElementById('btn-submit');
  if(!confirm(`確認要送出 ${opt.value} 的劃假資料嗎？`)) return;

  btn.innerText = '正在送出暫存...';
  btn.disabled = true;

  cloudPost('submit', {
    empId: opt.dataset.id, name: opt.value, group: group,
    picks: userPicks, overtime: userOvertime
  }).then(() => {
    alert('🎉 劃假資料已成功提交雲端！');
  }).catch(err => {
    alert('⚠️ 連線回應逾時，請至後台總覽核對是否上傳成功。\n' + err.toString());
  }).finally(() => {
    btn.innerText = '確認無誤，送出劃假';
    btn.disabled = false;
  });
}

// ═══════════ 後台表格渲染 ═══════════
function renderBackendTable() {
  const body = document.getElementById('be-body');
  body.innerHTML = '';
  const subs = cloudData.submissions || [];
  if(!subs.length) {
    body.innerHTML = `<tr><td colspan="5" class="be-empty">目前試算表中無任何有效紀錄</td></tr>`;
    return;
  }
  let html = '';
  subs.forEach(s => {
    const counts = {};
    Object.values(s.picks || {}).forEach(v => { counts[v] = (counts[v] || 0) + 1; });
    let pTxt = Object.keys(counts).map(k => `${k}:${counts[k]}天`).join(', ') || '無';
    let otTxt = (s.overtime && s.overtime.length) ? ` <span style="color:#3a6b5a;font-weight:bold">| 加班意願: ${s.overtime.map(d=>d.split('-')[2]||d).join(',')}日</span>` : '';

    html += `<tr>
      <td>${s.group === 'fixed' ? '固定班' : '輪班組'}</td>
      <td style="font-family:monospace">${s.empId}</td>
      <td style="font-weight:bold">${s.name}</td>
      <td style="color:var(--text-muted)">${s.submittedAt}</td>
      <td style="text-align:left;padding-left:12px">劃假 [ ${pTxt} ]${otTxt}</td>
    </tr>`;
  });
  body.innerHTML = html;
}

// ═══════════ 後台日誌歷程渲染 ═══════════
function renderLogTable() {
  const body = document.getElementById('log-body');
  body.innerHTML = '';
  const logs = cloudData.submitLog || [];
  if(!logs.length) {
    body.innerHTML = `<tr><td colspan="4" class="be-empty">暫無送出日誌</td></tr>`;
    return;
  }
  let html = '';
  [...logs].reverse().forEach(l => {
    html += `<tr>
      <td style="color:var(--text-muted);font-family:monospace;text-align:left">${l.submittedAt||''}</td>
      <td style="font-weight:bold;text-align:left">${l.empId||''}</td>
      <td style="text-align:left">${l.name||''}</td>
      <td style="color:var(--accent-dark);text-align:left">${l.summary||''}</td>
    </tr>`;
  });
  body.innerHTML = html;
}

function exportToCSV() {
  const subs = cloudData.submissions || [];
  if(!subs.length) return alert('無任何數據可導出');
  const dates = getPeriodDates();
  const headers = ['組別','員編','姓名','送出時間'].concat(dates.map(d => `${d.dateStr}(${d.wkName})`)).concat(['自願加班日期']);
  const rows = [headers];

  subs.forEach(s => {
    const r = [s.group==='fixed'?'固定班':'輪班組', s.empId, s.name, s.submittedAt];
    dates.forEach(d => r.push(s.picks[d.dateStr] || ''));
    r.push((s.overtime || []).join(';'));
    rows.push(r);
  });

  const bom = '﻿';
  const csv = bom + rows.map(r => r.map(v => {
    const s = String(v == null ? '' : v);
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(',')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const period = `${cfg.startDate.replace(/-/g,'')}`;
  a.href = url; a.download = `劃假表_${period}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ═══════════ 後台設定與權限 ═══════════
let isAdminAuthenticated = false;

function showAdminTabs(show) {
  if(show) {
    document.getElementById('admin-auth-card').style.display = 'none';
    document.getElementById('admin-main-box').style.display = 'block';
    fillAdminFields();
  } else {
    document.getElementById('admin-auth-card').style.display = 'block';
    document.getElementById('admin-main-box').style.display = 'none';
  }
}

function checkAdminAuth() {
  if(document.getElementById('admin-pw-input').value === (cfg.adminPw || '1234')) {
    isAdminAuthenticated = true;
    showAdminTabs(true);
  } else {
    alert('❌ 密碼錯誤！');
  }
}

function switchAdminTab(subId) {
  document.querySelectorAll('.admin-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.admin-sub-page').forEach(p=>p.classList.remove('active'));
  document.getElementById(`atb-${subId}`).classList.add('active');
  document.getElementById(`asub-${subId}`).classList.add('active');
}

function fillAdminFields() {
  document.getElementById('cfg-start-date').value = cfg.startDate || '';
  document.getElementById('cfg-notice').value = cfg.noticeText || '';
  document.getElementById('cfg-pw').value = cfg.adminPw || '1234';
  document.getElementById('cfg-emps-fixed').value = JSON.stringify(cfg.employees?.fixed || []);
  document.getElementById('cfg-emps-rotate').value = JSON.stringify(cfg.employees?.rotate || []);
  previewDates();
}

function previewDates() {
  const val = document.getElementById('cfg-start-date').value;
  if(!val) return;
  const tempBase = new Date(val);
  const hWk = document.getElementById('cfg-grid-wk');
  const hDay = document.getElementById('cfg-grid-day');
  const rAct = document.getElementById('cfg-grid-action');
  hWk.innerHTML = ''; hDay.innerHTML = ''; rAct.innerHTML = '';

  for(let i=0; i<28; i++) {
    const d = new Date(tempBase.getTime() + i*24*60*60*1000);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth()+1).padStart(2,'0');
    const dd = String(d.getDate()).padStart(2,'0');
    const dateStr = `${yyyy}-${mm}-${dd}`;

    let isHoliday = (d.getDay()===0 || d.getDay()===6);
    if(cfg.overtimeDates && cfg.overtimeDates[dateStr]) isHoliday = true;
    if(cfg.workDates && cfg.workDates[dateStr])     isHoliday = false;

    const thWk = document.createElement('th'); thWk.innerText = WKNAMES[d.getDay()];
    if(isHoliday) thWk.className = 'wk'; hWk.appendChild(thWk);

    const thDay = document.createElement('th'); thDay.innerText = d.getDate();
    if(isHoliday) thDay.className = 'wk'; hDay.appendChild(thDay);

    const td = document.createElement('td');
    const btn = document.createElement('button');
    btn.type = 'button'; btn.className = 'cbadge';
    
    if(cfg.overtimeDates?.[dateStr]) { btn.style.background = 'var(--x)'; btn.style.color = '#fff'; btn.innerText = '休'; }
    else if(cfg.workDates?.[dateStr]) { btn.style.background = 'var(--a)'; btn.style.color = '#fff'; btn.innerText = '班'; }
    else { btn.innerText = (d.getDay()===0 || d.getDay()===6) ? '休' : '班'; }

    btn.onclick = () => {
      if(!cfg.overtimeDates) cfg.overtimeDates = {};
      if(!cfg.workDates) cfg.workDates = {};
      if(!cfg.overtimeDates[dateStr] && !cfg.workDates[dateStr]) {
        cfg.overtimeDates[dateStr] = true; btn.style.background = 'var(--x)'; btn.style.color = '#fff'; btn.innerText = '休';
      } else if(cfg.overtimeDates[dateStr]) {
        delete cfg.overtimeDates[dateStr]; cfg.workDates[dateStr] = true; btn.style.background = 'var(--a)'; btn.style.color = '#fff'; btn.innerText = '班';
      } else {
        delete cfg.workDates[dateStr]; btn.style.background = ''; btn.style.color = ''; btn.innerText = (d.getDay()===0 || d.getDay()===6) ? '休' : '班';
      }
    };
    td.appendChild(btn); rAct.appendChild(td);
  }
}

function doSaveConfig() {
  let fixedList = [], rotateList = [];
  try {
    fixedList = JSON.parse(document.getElementById('cfg-emps-fixed').value);
    rotateList = JSON.parse(document.getElementById('cfg-emps-rotate').value);
  } catch(e) { return alert('❌ 人員名單 JSON 格式錯誤！'); }

  const b1 = document.getElementById('btn-save-cfg-1');
  const b2 = document.getElementById('btn-save-cfg-2');
  b1.disabled = b2.disabled = true; b1.innerText = b2.innerText = '正在儲存至雲端...';

  cfg.startDate = document.getElementById('cfg-start-date').value;
  cfg.noticeText = document.getElementById('cfg-notice').value;
  cfg.adminPw = document.getElementById('cfg-pw').value;
  cfg.employees = { fixed: fixedList, rotate: rotateList };

  cloudPost('saveConfig', { cfg: cfg }).then(() => {
    alert('🎉 系統設定已成功與試算表同步！');
    buildPeriodGrid(); buildEmployeePage();
  }).catch(err => alert(err.toString())).finally(() => {
    b1.disabled = b2.disabled = false; b1.innerText = b2.innerText = '儲存設定並同步至雲端';
  });
}

// ═══════════ INIT ═══════════
function init(){
  showAdminTabs(false);
  buildEmployeePage();
  
  if(SCRIPT_URL){
    cloudGet('getConfig').then(res=>{
      if(!res||!res.ok||!res.cfg) return;
      const c = res.cfg;
      const hasEmps = c.employees && ((c.employees.fixed||[]).length>0 || (c.employees.rotate||[]).length>0);
      if(!hasEmps)          c.employees     = cfg.employees || DEFAULT_CFG.employees;
      if(!c.adminPw)        c.adminPw       = cfg.adminPw || '1234';
      if(!c.overtimeDates)  c.overtimeDates = {};
      if(!c.workDates)      c.workDates     = {};
      if(!c.noticeText)     c.noticeText    = cfg.noticeText || DEFAULT_CFG.noticeText;
      if(!c.startDate)      c.startDate     = cfg.startDate || DEFAULT_CFG.startDate;
      
      cfg = c;
      buildEmployeePage();
    }).catch(err => {
      console.error("雲端載入失敗，已切換至預備本機設定。", err);
    });
  }
}
window.onload = init;
</script>
